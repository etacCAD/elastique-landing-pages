services:
  - type: web
    name: elastique-cold-traffic
    env: static
    staticPublishPath: ./cold-traffic
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: elastique-travel
    env: static
    staticPublishPath: ./travel
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: elastique-recovery
    env: static
    staticPublishPath: ./recovery
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
